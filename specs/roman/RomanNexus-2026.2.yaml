# These fields define the image and environment names as well as the
# mission environment's python version and expected availability dates.
# The deployment name defines which base overall build process is used.
image_spec_header:
  image_name: RomanNexus-2026.2
  deployment_name: wrangler
  kernel_name: RomanNexus-2026.2
  display_name: Roman Research Nexus 2026.2
  description: |
    This spec is for final Roman's pre-launch release
  valid_on: '2026-09-15'
  expires_on: '2027-02-15'
  python_version: '3.12'

# These are the git repositories and branch/tag/hash that will be
# used to define packages, data, and installed notebooks.
repositories:
  roman_notebooks:
    url: https://github.com/spacetelescope/roman_notebooks.git
    ref: "2026.2"

# This is system config that is generally not changed by curators.
system:
  spec_version: '2.1'
  archive_format: .tar
  # The primary repo
  primary_repo: spacetelescope/roman_notebooks
  nb-wrangler:
    repo: https://github.com/spacetelescope/nb-wrangler.git
    ref: main
  spi:
    repo: https://github.com/spacetelescope/science-platform-images.git
    ref: dev
  date_updated: '2026-07-23T11:59:48.150731'
  spec_sha256: 7a5f843d72c1bb90dd5783f3e0a5990edc28a1fb39d89edde08e24c296f05b30

# Files that are downloaded and/or copied to the specified locations in images
assets:
  - repo: https://github.com/spacetelescope/nb-wrangler-images.git
    ref: main
    source: assets/roman
    destination: /opt/environments
  - repo: https://github.com/spacetelescope/nb-wrangler-images.git
    ref: main
    source: assets/generic/stop_server_ext.json
    destination: /etc/jupyter/jupyter_server_config.d
  - repo: https://github.com/spacetelescope/nb-wrangler-images.git
    ref: main
    source: assets/generic/stop_server_ext.json
    destination: /srv/jupyter

# Supported notebooks that will define the environment and by sync'ed to the science platform.
selected_notebooks:
  roman_all:
    repo: roman_notebooks
    root_directory: notebooks/
    include_subdirs:
      - '.*'
  # -----   exclude_subdirs:
  # -----     - data_visualization/data_visualization.ipynb
  # ----- roman_data_viz:
  # -----   repo: roman_notebooks
  # -----   root_directory: notebooks/
  # -----   include_subdirs:
  # -----     - data_visualization/data_visualization.ipynb
  # -----   tests:
  # -----     papermill: false

# If defined, these replace defaults while in --dev development mode.
# --dev mode is the default for --curate and enables these
# --prod mode is the default for --reinstall and disables these.
dev_overrides:
  system:
    primary_repo: jaytmiller/roman_notebooks
    nb-wrangler:
      repo: https://github.com/jaytmiller/nb-wrangler.git
      ref: dev
    spi:
      repo: https://github.com/jaytmiller/science-platform-images.git
      ref: dev
  repositories:
    roman_notebooks:
      url: https://github.com/spacetelescope/roman_notebooks.git
      ref: '2026.2.x'
  assets:
    - repo: https://github.com/jaytmiller/nb-wrangler-images.git
      ref: dev
      source: assets/generic/stop_server_ext.json
      destination: /etc/jupyter/jupyter_server_config.d
    - repo: https://github.com/jaytmiller/nb-wrangler-images.git
      ref: dev
      source: assets/generic/stop_server_ext.json
      destination: /srv/jupyter

# Packages installed by mamba in the mission environment only.
extra_mamba_packages:
  - pip

# Packages installed by mamba in both base and mission environments.
common_mamba_packages: []

# Packages are installed by pip or uv pip in the mission environment only.
extra_pip_packages:
  - boto3
  - lsstdesc.coord
  - healpy>=1.20.b1

# Packages installed by pip or uv pip in both base and mission environments.
common_pip_packages:
  - bqplot>=0.12.47

# Packages for which overall dependency constaints overridden.  May not work!
override_pip_versions:
  # - jdaviz @ git+https://github.com/spacetelescope/jdaviz@main
  # - bqplot @ git+https://github.com/bmorris3/bqplot@pandas3
  # - bqplot-gl @ git+https://github.com/bqplot/bqplot-gl@0.1.0a0

# A text file that will be injected into image builds and executed by Docker.
dockerfile_aux_sh: |
  #! /bin/bash
  set -euxo pipefail

